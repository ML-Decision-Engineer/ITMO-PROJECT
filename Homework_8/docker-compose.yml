x-backend-runtime: &backend-runtime
  image: homework8-backend:latest
  restart: unless-stopped

  environment:
    DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-homework8}:${POSTGRES_PASSWORD:-homework8}@database:5432/${POSTGRES_DB:-homework8}

    RABBITMQ_HOST: rabbitmq
    RABBITMQ_PORT: 5672
    RABBITMQ_USER: ${RABBITMQ_USER:-homework8}
    RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-homework8}
    RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-daily_prediction_queue}

    MODEL_BUNDLE_PATH: ${MODEL_BUNDLE_PATH:-/project/artifacts/model_bundle.joblib}
    DATA_PATH: ${DATA_PATH:-/project/data_mvp.csv}

  volumes:
    - ./MODEL_WORK.py:/project/MODEL_WORK.py:ro
    - ./data_mvp_demo.csv:/project/data_mvp.csv:ro
    - ./artifacts:/project/artifacts:ro

  depends_on:
    database:
      condition: service_healthy

    rabbitmq:
      condition: service_healthy

  networks:
    - homework8-network


services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homework8}
      POSTGRES_USER: ${POSTGRES_USER:-homework8}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homework8}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-homework8} -d ${POSTGRES_DB:-homework8}"
        ]

      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - homework8-network


  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-homework8}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-homework8}

    ports:
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test:
        [
          "CMD",
          "rabbitmq-diagnostics",
          "-q",
          "ping"
        ]

      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - homework8-network


  api:
    <<: *backend-runtime

    build:
      context: .
      dockerfile: backend/Dockerfile

    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"
        ]

      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  worker:
    <<: *backend-runtime

    command:
      [
        "python",
        "-m",
        "app.worker"
      ]


  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro

    depends_on:
      api:
        condition: service_healthy

    networks:
      - homework8-network


networks:
  homework8-network:
    driver: bridge


volumes:
  postgres_data:
  rabbitmq_data: